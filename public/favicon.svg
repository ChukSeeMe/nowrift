<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0f"/>
  <!-- Red diagonal slash — the core brand element -->
  <line x1="8" y1="24" x2="24" y2="8"
        stroke="#FF3D3D" stroke-width="3"
        stroke-linecap="round"/>
  <!-- N letterform -->
  <text x="4" y="22"
        font-family="Space Grotesk, sans-serif"
        font-weight="700"
        font-size="16"
        fill="#FFFFFF">N</text>
</svg>
